spring:
  application:
    name: reconpilot
  datasource:
    url: ${RG_DB_URL:jdbc:h2:file:./data/reconcileguard;MODE=Oracle}
    username: ${RG_DB_USERNAME:sa}
    password: ${RG_DB_PASSWORD:}
    driver-class-name: ${RG_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

server:
  port: ${RG_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript,image/svg+xml
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

reconcileguard:
  security:
    jwt-secret: ${RG_JWT_SECRET:change-this-secret-to-at-least-32-characters}
    token-ttl-minutes: ${RG_TOKEN_TTL_MINUTES:480}
    email-verification-ttl-minutes: ${RG_EMAIL_VERIFICATION_TTL_MINUTES:60}
    password-reset-ttl-minutes: ${RG_PASSWORD_RESET_TTL_MINUTES:30}
    expose-verification-token: ${RG_EXPOSE_VERIFICATION_TOKEN:true}
  rate-limit:
    per-minute: ${RG_RATE_LIMIT_PER_MINUTE:120}
