services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      RG_PORT: "8080"
      RG_DB_URL: "jdbc:h2:file:/data/reconcileguard;MODE=Oracle;DATABASE_TO_UPPER=false"
      RG_DB_USERNAME: "sa"
      RG_DB_PASSWORD: ""
      RG_DB_DRIVER: "org.h2.Driver"
      RG_JWT_SECRET: "replace-this-secret-with-at-least-32-bytes"
      RG_ADMIN_PASSWORD: "replace-this-admin-password"
      RG_RATE_LIMIT_PER_MINUTE: "120"
    volumes:
      - reconcileguard-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  oracle:
    profiles: ["oracle"]
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: "reconcileguard"
      APP_USER: "RG_APP"
      APP_USER_PASSWORD: "reconcileguard"
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  reconcileguard-data:
  oracle-data:
